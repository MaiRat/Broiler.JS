name: test262-full-script-host

on:
  workflow_dispatch:
    inputs:
      suite_ref:
        description: Optional test262 ref or commit SHA to execute
        required: false
        default: ccaac100ff49d81e9ff47a75ff4c60e0bd3f262e
      shard_index:
        description: Zero-based shard index to execute, or -1 to run all shards
        type: number
        required: false
        default: -1
      test_timeout_seconds:
        description: Per-test timeout in seconds
        type: number
        required: false
        default: 30
      memory_limit_mb:
        description: Per-test POSIX memory cap in MiB (0 disables the cap)
        type: number
        required: false
        default: 0

permissions:
  contents: read

env:
  TEST262_REF: ${{ inputs.suite_ref || 'ccaac100ff49d81e9ff47a75ff4c60e0bd3f262e' }}
  TEST262_ROOT: ${{ github.workspace }}/.cache/test262
  RESULTS_DIR: ${{ github.workspace }}/.artifacts/test262/full-script-host
  BROILER_DLL: ${{ github.workspace }}/Broiler.JS/Broiler.JavaScript/bin/Release/net8.0/BroilerJS.dll
  SHARD_COUNT: 8
  SELECTED_SHARD_INDEX: ${{ inputs.shard_index }}
  TEST_TIMEOUT_SECONDS: ${{ inputs.test_timeout_seconds || 30 }}
  MEMORY_LIMIT_MB: ${{ inputs.memory_limit_mb || 0 }}

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      shard-matrix: ${{ steps.shards.outputs.matrix }}
    steps:
      - name: Resolve shard matrix
        id: shards
        shell: bash
        run: |
          python <<'PY'
          import json
          import os
          import sys

          shard_count = int(os.environ["SHARD_COUNT"])
          requested_shard_index = os.environ["SELECTED_SHARD_INDEX"]

          try:
              shard_index = int(requested_shard_index)
          except ValueError:
              sys.exit(
                  f"shard_index must be an integer value: -1 or between 0 and "
                  f"{shard_count - 1}, got {requested_shard_index!r}"
              )

          if shard_index == -1:
              matrix = [{"shard-index": index} for index in range(shard_count)]
          elif 0 <= shard_index < shard_count:
              matrix = [{"shard-index": shard_index}]
          else:
              sys.exit(
                  f"shard_index must be -1 or between 0 and {shard_count - 1}, got {shard_index}"
              )

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
              handle.write(f"matrix={json.dumps(matrix)}\n")
          PY

  run:
    needs: plan
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.plan.outputs.shard-matrix) }}

    steps:
      - name: Check out Broiler.JS
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'Directory.Build.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache test262 checkout
        id: cache-test262
        uses: actions/cache@v4
        with:
          path: ${{ env.TEST262_ROOT }}
          key: test262-${{ runner.os }}-${{ env.TEST262_REF }}

      - name: Download selected test262 suite
        if: steps.cache-test262.outputs.cache-hit != 'true'
        run: |
          rm -rf "$TEST262_ROOT"
          git clone --filter=blob:none https://github.com/tc39/test262.git "$TEST262_ROOT"
          git -C "$TEST262_ROOT" checkout --force "$TEST262_REF"

      - name: Restore Broiler.JS
        run: dotnet restore Broiler.JS.slnx

      - name: Build Broiler.JS CLI
        run: dotnet build Broiler.JS/Broiler.JavaScript/Broiler.JavaScript.csproj -c Release

      - name: Run full script-host-verifiable shard
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RESULTS_DIR"
          output_path="$RESULTS_DIR/shard-${{ matrix.shard-index }}.json"
          log_path="$RESULTS_DIR/shard-${{ matrix.shard-index }}.log"
          exit_code_path="$RESULTS_DIR/shard-${{ matrix.shard-index }}.exit-code.txt"
          # Temporarily relax errexit so the shard log is still captured when the runner fails.
          set +e
          python scripts/compliance/run_test262.py \
            --suite-ref "$TEST262_REF" \
            --suite-root "$TEST262_ROOT" \
            --broiler-dll "$BROILER_DLL" \
            --all-script-host-verifiable \
            --shard-count "$SHARD_COUNT" \
            --shard-index "${{ matrix.shard-index }}" \
            --test-timeout-seconds "$TEST_TIMEOUT_SECONDS" \
            --memory-limit-mb "$MEMORY_LIMIT_MB" \
            --output "$output_path" 2>&1 | tee "$log_path"
          # Preserve the Python exit status rather than tee's exit status.
          status=${PIPESTATUS[0]}
          set -e
          printf '%s\n' "$status" > "$exit_code_path"
          exit "$status"

      - name: Publish shard summary
        if: always()
        shell: bash
        run: |
          python <<'PY'
          import json
          import os
          from pathlib import Path

          shard_index = "${{ matrix.shard-index }}"
          results_dir = Path(os.environ["RESULTS_DIR"])
          result_path = results_dir / f"shard-{shard_index}.json"

          if not result_path.exists():
              exit_code_path = results_dir / f"shard-{shard_index}.exit-code.txt"
              exit_code = exit_code_path.read_text(encoding="utf-8").strip() if exit_code_path.exists() else "unknown"
              Path(os.environ["GITHUB_STEP_SUMMARY"]).write_text(
                  "\n".join(
                      [
                          f"## test262 full script-host shard {int(shard_index) + 1}/{os.environ['SHARD_COUNT']}",
                          "",
                          "- Runner did not produce a JSON summary.",
                          f"- Exit code: {exit_code}",
                          f"- Captured log: available in the uploaded artifact at `shard-{shard_index}.log`",
                      ]
                  ) + "\n",
                  encoding="utf-8",
              )
              raise SystemExit(0)

          summary = json.loads(result_path.read_text(encoding="utf-8"))

          lines = [
              f"## test262 full script-host shard {int(shard_index) + 1}/{summary['shardCount']}",
              "",
              f"- Suite ref: `{summary['suiteRef']}`",
              f"- Selection mode: `{summary['selectionMode']}`",
              f"- Candidate paths discovered: {summary['candidateCount']}",
              f"- Runnable paths before sharding: {summary['selectedCountBeforeSharding']}",
              f"- Paths executed in this shard: {len(summary['expandedPaths'])}",
              f"- Per-test timeout: {summary['testTimeoutSeconds']}s",
              (
                  f"- Per-test memory cap: {summary['memoryLimitMb']} MiB"
                  if summary['memoryLimitMb']
                  else "- Per-test memory cap: 0 MiB (disabled)"
              ),
              f"- Passed: {summary['passed']}",
              f"- Failed: {summary['failed']}",
              f"- Skipped: {summary['skipped']}",
              f"- Timed out: {summary['timedOut']}",
          ]

          Path(os.environ["GITHUB_STEP_SUMMARY"]).write_text(
              "\n".join(lines) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Upload shard logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test262-full-script-host-shard-${{ matrix.shard-index }}
          path: ${{ env.RESULTS_DIR }}

  combine-logs:
    needs: run
    if: always() && needs.run.result != 'skipped'
    runs-on: ubuntu-latest
    steps:
      - name: Check out Broiler.JS
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Download shard logs into one directory
        uses: actions/download-artifact@v4
        with:
          pattern: test262-full-script-host-shard-*
          path: ${{ env.RESULTS_DIR }}/merged
          merge-multiple: true

      - name: Merge shard logs into one artifact
        uses: actions/upload-artifact/merge@v4
        with:
          name: test262-full-script-host-logs
          pattern: test262-full-script-host-shard-*
          separate-directories: false
          delete-merged: true

      - name: Generate LogParser issue content
        id: logparser
        shell: bash
        env:
          LOGPARSER_LOGS_DIR: ${{ env.RESULTS_DIR }}/merged
          LOGPARSER_OUTPUT_DIR: ${{ env.RESULTS_DIR }}/logparser
        run: |
          set -euo pipefail
          mkdir -p "$LOGPARSER_OUTPUT_DIR"
          issue_body_path="$LOGPARSER_OUTPUT_DIR/issue.md"
          issue_json_path="$LOGPARSER_OUTPUT_DIR/issue.json"

          # --most-common-problem narrows the report to the highest-frequency
          # type/context/message combination so the emitted markdown can be
          # posted directly as a focused GitHub issue body.
          dotnet run --project logs/LogParser -- \
            "$LOGPARSER_LOGS_DIR" \
            --most-common-problem > "$issue_body_path"

          dotnet run --project logs/LogParser -- \
            "$LOGPARSER_LOGS_DIR" \
            --most-common-problem \
            --output json > "$issue_json_path"

          ISSUE_JSON_PATH="$issue_json_path" python <<'PY'
          import json
          import os
          from pathlib import Path

          issue_json = json.loads(Path(os.environ["ISSUE_JSON_PATH"]).read_text(encoding="utf-8"))
          problem = issue_json.get("problem")
          should_create_issue = problem is not None

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
              handle.write(f"create_issue={'true' if should_create_issue else 'false'}\n")

              if should_create_issue:
                  context = (problem.get("context") or "unknown context").strip()
                  message = (problem.get("message") or "").strip()
                  title = f"test262 full script-host common failure: {problem['type']} @ {context}"
                  if message:
                      title = f"{title} - {message}"

                  normalized_title = " ".join(title.split())[:256]
                  handle.write(f"issue_title={normalized_title}\n")
          PY

      - name: Report when no common parsed exception was found
        if: steps.logparser.outputs.create_issue != 'true'
        shell: bash
        run: |
          {
            echo "### LogParser issue creation"
            echo "- No parsed exceptions were found in the merged shard logs."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Report missing ISSUE_TOKEN secret
        if: steps.logparser.outputs.create_issue == 'true' && secrets.ISSUE_TOKEN == ''
        shell: bash
        run: |
          {
            echo "### LogParser issue creation"
            echo "- LogParser found a common problem, but \`ISSUE_TOKEN\` is not configured, so no issue was created."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create GitHub issue for common problem
        if: steps.logparser.outputs.create_issue == 'true' && secrets.ISSUE_TOKEN != ''
        uses: actions/github-script@v7
        env:
          ISSUE_BODY_PATH: ${{ env.RESULTS_DIR }}/logparser/issue.md
          ISSUE_TITLE: ${{ steps.logparser.outputs.issue_title }}
        with:
          github-token: ${{ secrets.ISSUE_TOKEN }}
          script: |
            const fs = require('fs');
            const issueBody = fs.readFileSync(process.env.ISSUE_BODY_PATH, 'utf8').trim();
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${context.repo.owner}/${context.repo.repo}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            const body = [
              issueBody,
              '',
              '### CI metadata',
              `- Workflow run: ${runUrl}`,
              `- Suite ref: \`${process.env.TEST262_REF}\``,
              '- Artifact: `test262-full-script-host-logs`',
            ].join('\n');

            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: process.env.ISSUE_TITLE,
              body,
            });

            core.info(`Created issue #${issue.data.number}: ${issue.data.html_url}`);
