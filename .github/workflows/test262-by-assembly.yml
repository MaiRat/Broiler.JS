name: test262-by-assembly

# Orchestrates one dedicated test262 invocation per Broiler.JS assembly so that
# each assembly (parser, compiler, runtime, builtins, intl, annexb) can be
# tested independently in CI. This workflow is an extension of the existing
# `test262` and `test262-full-script-host` workflows; those workflows continue
# to run unchanged.
#
# The mapping from assembly name to the test262 path prefixes that exercise
# it lives in `scripts/compliance/test262-assemblies.json`. To test only a
# single assembly, dispatch this workflow and select the desired value for
# the `assembly` input (or pass it to the CLI helper documented in
# `docs/compliance/process.md`).

on:
  workflow_dispatch:
    inputs:
      assembly:
        description: Assembly to test (use "all" to fan out across every assembly)
        required: false
        default: all
        type: choice
        options:
          - all
          - parser
          - compiler
          - runtime
          - builtins
          - intl
          - annexb
      suite_ref:
        description: Optional test262 ref or commit SHA to execute
        required: false
        default: ccaac100ff49d81e9ff47a75ff4c60e0bd3f262e
      test_timeout_seconds:
        description: Per-test wall-clock timeout in seconds
        required: false
        default: "30"
      max_workers:
        description: Number of parallel worker threads per assembly job
        required: false
        default: "1"

permissions:
  contents: read

env:
  TEST262_REF: ${{ inputs.suite_ref || 'ccaac100ff49d81e9ff47a75ff4c60e0bd3f262e' }}
  TEST262_ROOT: ${{ github.workspace }}/.cache/test262
  RESULTS_DIR: ${{ github.workspace }}/.artifacts/test262/by-assembly
  BROILER_DLL: ${{ github.workspace }}/Broiler.JS/Broiler.JavaScript/bin/Release/net8.0/BroilerJS.dll
  TEST_TIMEOUT_SECONDS: ${{ inputs.test_timeout_seconds || '30' }}
  MAX_WORKERS: ${{ inputs.max_workers || '1' }}
  MEMORY_LIMIT_MB: 0

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      assemblies: ${{ steps.plan.outputs.assemblies }}
    steps:
      - name: Check out Broiler.JS
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compute assembly matrix
        id: plan
        shell: bash
        env:
          REQUESTED_ASSEMBLY: ${{ inputs.assembly || 'all' }}
        run: |
          set -euo pipefail
          assemblies=$(python scripts/compliance/list_test262_assemblies.py \
            --manifest scripts/compliance/test262-assemblies.json \
            --selection "$REQUESTED_ASSEMBLY")
          echo "assemblies=$assemblies" >> "$GITHUB_OUTPUT"
          echo "Planned assemblies: $assemblies"

  test262:
    needs: plan
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        assembly: ${{ fromJson(needs.plan.outputs.assemblies) }}

    steps:
      - name: Check out Broiler.JS
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'Directory.Build.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache test262 checkout
        id: cache-test262
        uses: actions/cache@v4
        with:
          path: ${{ env.TEST262_ROOT }}
          key: test262-${{ runner.os }}-${{ env.TEST262_REF }}

      - name: Download pinned test262 suite
        if: steps.cache-test262.outputs.cache-hit != 'true'
        run: |
          rm -rf "$TEST262_ROOT"
          git clone --filter=blob:none https://github.com/tc39/test262.git "$TEST262_ROOT"
          git -C "$TEST262_ROOT" checkout --force "$TEST262_REF"

      - name: Restore Broiler.JS
        run: dotnet restore Broiler.JS.slnx

      - name: Build Broiler.JS CLI
        run: dotnet build Broiler.JS/Broiler.JavaScript/Broiler.JavaScript.csproj -c Release

      - name: Materialize assembly path manifest
        id: manifest
        shell: bash
        env:
          ASSEMBLY: ${{ matrix.assembly }}
        run: |
          set -euo pipefail
          mkdir -p "$RESULTS_DIR"
          manifest_path="$RESULTS_DIR/${ASSEMBLY}-paths.txt"
          python scripts/compliance/list_test262_assemblies.py \
            --manifest scripts/compliance/test262-assemblies.json \
            --paths-for "$ASSEMBLY" \
            --output "$manifest_path"
          echo "manifest=$manifest_path" >> "$GITHUB_OUTPUT"
          echo "Resolved manifest for $ASSEMBLY:"
          cat "$manifest_path"

      - name: Run test262 for assembly ${{ matrix.assembly }}
        shell: bash
        env:
          ASSEMBLY: ${{ matrix.assembly }}
          MANIFEST_PATH: ${{ steps.manifest.outputs.manifest }}
        run: |
          set -euo pipefail
          output_path="$RESULTS_DIR/${ASSEMBLY}.json"
          python scripts/compliance/run_test262.py \
            --suite-ref "$TEST262_REF" \
            --suite-root "$TEST262_ROOT" \
            --broiler-dll "$BROILER_DLL" \
            --path-file "$MANIFEST_PATH" \
            --test-timeout-seconds "$TEST_TIMEOUT_SECONDS" \
            --memory-limit-mb "$MEMORY_LIMIT_MB" \
            --max-workers "$MAX_WORKERS" \
            --output "$output_path"

      - name: Publish workflow summary
        if: always()
        shell: bash
        env:
          ASSEMBLY: ${{ matrix.assembly }}
        run: |
          python <<'PY'
          import json
          import os
          from pathlib import Path

          assembly = os.environ["ASSEMBLY"]
          result_path = Path(os.environ["RESULTS_DIR"]) / f"{assembly}.json"
          if not result_path.is_file():
              Path(os.environ["GITHUB_STEP_SUMMARY"]).write_text(
                  f"## test262 ({assembly})\n\nNo result file was produced.\n",
                  encoding="utf-8",
              )
              raise SystemExit(0)

          summary = json.loads(result_path.read_text(encoding="utf-8"))
          lines = [
              f"## test262 ({assembly})",
              "",
              f"- Suite ref: `{summary['suiteRef']}`",
              f"- Selection mode: `{summary['selectionMode']}`",
              f"- Candidate paths discovered: {summary['candidateCount']}",
              f"- Runnable paths before sharding: {summary['selectedCountBeforeSharding']}",
              f"- Paths executed: {len(summary['expandedPaths'])}",
              f"- Per-test timeout: {summary['testTimeoutSeconds']}s",
              f"- Passed: {summary['passed']}",
              f"- Failed: {summary['failed']}",
              f"- Skipped: {summary['skipped']}",
              f"- Timed out: {summary['timedOut']}",
          ]
          Path(os.environ["GITHUB_STEP_SUMMARY"]).write_text(
              "\n".join(lines) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Upload assembly result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test262-assembly-${{ matrix.assembly }}
          path: ${{ env.RESULTS_DIR }}/${{ matrix.assembly }}.json
